<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mano — New Chat (/app)</title>
  <style>
    /* ===== Tokens ===== */
    :root {
      --bg:          #ffffff;
      --bg-sidebar:  #fafafa;
      --bg-input:    #ffffff;
      --bg-hover:    #f4f4f5;
      --bg-active:   #f0f0f1;
      --bg-bubble:   #f4f4f5;
      --border:      #e4e4e7;
      --border-input:#d4d4d8;
      --fg:          #09090b;
      --fg-muted:    #71717a;
      --fg-faint:    #a1a1aa;
      --fg-on-primary:#ffffff;
      --primary:     #18181b;
      --primary-hover:#27272a;
      --radius:      0.625rem;
      --radius-lg:   0.875rem;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", Roboto, Helvetica, Arial, sans-serif;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg:          #09090b;
        --bg-sidebar:  #0c0c0e;
        --bg-input:    #09090b;
        --bg-hover:    #18181b;
        --bg-active:   #1c1c1f;
        --bg-bubble:   #18181b;
        --border:      #1e1e22;
        --border-input:#27272a;
        --fg:          #fafafa;
        --fg-muted:    #a1a1aa;
        --fg-faint:    #52525b;
        --fg-on-primary:#09090b;
        --primary:     #fafafa;
        --primary-hover:#e4e4e7;
        --radius:      0.625rem;
        --radius-lg:   0.875rem;
      }
    }

    /* ===== Reset ===== */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; font-family: var(--font); background: var(--bg); color: var(--fg); font-size: 14px; -webkit-font-smoothing: antialiased; }

    /* ===== Layout ===== */
    .layout { display: flex; height: 100vh; }

    /* ===== Sidebar ===== */
    .sidebar {
      width: 260px;
      min-width: 260px;
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }

    .sidebar-header {
      padding: 16px 14px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-size: 15px;
      font-weight: 650;
      letter-spacing: -0.02em;
      color: var(--fg);
    }

    .icon-btn {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      border: none;
      background: transparent;
      color: var(--fg-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.12s;
    }
    .icon-btn:hover { background: var(--bg-hover); color: var(--fg); }
    .icon-btn svg { width: 16px; height: 16px; stroke-width: 1.75; }

    /* Search */
    .search-box {
      margin: 0 10px 8px;
      position: relative;
    }
    .search-box svg {
      position: absolute;
      left: 9px;
      top: 50%;
      transform: translateY(-50%);
      width: 14px;
      height: 14px;
      color: var(--fg-faint);
      stroke-width: 1.75;
    }
    .search-box input {
      width: 100%;
      height: 32px;
      padding: 0 10px 0 30px;
      border-radius: 6px;
      border: none;
      background: var(--bg-hover);
      color: var(--fg);
      font-size: 13px;
      font-family: var(--font);
      outline: none;
    }
    .search-box input::placeholder { color: var(--fg-faint); }

    /* Session list — flat */
    .sessions { flex: 1; overflow-y: auto; padding: 2px 8px; }

    .session-item {
      padding: 8px 10px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.1s;
      font-size: 13px;
      color: var(--fg-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.4;
    }
    .session-item:hover { background: var(--bg-hover); color: var(--fg); }
    .session-item.active { background: var(--bg-active); color: var(--fg); font-weight: 500; }

    /* Sidebar footer */
    .sidebar-footer {
      padding: 6px 8px;
    }
    .sidebar-footer-item {
      padding: 7px 10px;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--fg-muted);
      transition: all 0.1s;
    }
    .sidebar-footer-item:hover { background: var(--bg-hover); color: var(--fg); }
    .sidebar-footer-item svg { width: 15px; height: 15px; stroke-width: 1.75; }

    /* ===== Main Area ===== */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg);
    }

    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      margin-bottom: 32px;
    }
    .hero-title {
      font-size: 22px;
      font-weight: 650;
      color: var(--fg);
      letter-spacing: -0.03em;
    }
    .hero-subtitle {
      font-size: 14px;
      color: var(--fg-muted);
    }

    /* Chat input */
    .chat-input-wrapper {
      width: 100%;
      max-width: 620px;
      padding: 0 24px;
    }
    .chat-input-box {
      background: var(--bg-hover);
      border: 1px solid transparent;
      border-radius: var(--radius-lg);
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: border-color 0.15s, background 0.15s;
    }
    .chat-input-box:focus-within { background: var(--bg); border-color: var(--border); }

    .chat-textarea {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      color: var(--fg);
      font-size: 14px;
      line-height: 1.5;
      resize: none;
      font-family: var(--font);
      min-height: 22px;
    }
    .chat-textarea::placeholder { color: var(--fg-faint); }

    .chat-input-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .input-tools { display: flex; gap: 2px; }
    .input-tools .icon-btn { width: 30px; height: 30px; }
    .input-tools .icon-btn svg { width: 15px; height: 15px; }

    .send-btn {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      border: none;
      background: var(--primary);
      color: var(--fg-on-primary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.12s;
    }
    .send-btn:hover { background: var(--primary-hover); }
    .send-btn.disabled { opacity: 0.35; cursor: default; }
    .send-btn svg { width: 15px; height: 15px; stroke-width: 2; }

    /* Quick actions */
    .quick-actions {
      display: flex;
      gap: 6px;
      margin-top: 14px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 620px;
      padding: 0 24px;
    }
    .quick-action {
      padding: 6px 14px;
      border-radius: 99px;
      border: none;
      background: var(--bg-hover);
      color: var(--fg-muted);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.1s;
      font-family: var(--font);
    }
    .quick-action:hover { color: var(--fg); background: var(--bg-active); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>

<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <span class="logo">Mano</span>
      <button class="icon-btn" title="New chat">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>
      </button>
    </div>

    <div class="search-box">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m21 21-4.35-4.35M11 19a8 8 0 1 0 0-16 8 8 0 0 0 0 16Z"/></svg>
      <input type="text" placeholder="Search..." />
    </div>

    <div class="sessions">
      <div class="session-item">Build a landing page for SaaS</div>
      <div class="session-item">Research competitor pricing</div>
      <div class="session-item">Debug API rate limiting issue</div>
      <div class="session-item">Write blog post about AI agents</div>
      <div class="session-item">Set up CI/CD pipeline</div>
      <div class="session-item">Analyze Q4 financial data</div>
      <div class="session-item">Create Figma design system</div>
    </div>

    <div class="sidebar-footer">
      <div class="sidebar-footer-item">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.646.87a6.975 6.975 0 0 1 .78.45c.314.21.688.285 1.05.174l1.217-.456c.514-.192 1.09.022 1.366.488l1.297 2.245a1.125 1.125 0 0 1-.26 1.431l-1.004.827c-.292.24-.437.613-.43.992a7 7 0 0 1 0 .6c-.007.378.138.75.43.99l1.004.828c.424.35.534.955.26 1.43l-1.298 2.247a1.125 1.125 0 0 1-1.366.488l-1.216-.456c-.362-.111-.736-.036-1.05.174a6.97 6.97 0 0 1-.78.45c-.333.183-.583.495-.646.869l-.213 1.28c-.09.543-.56.941-1.11.941h-2.594c-.55 0-1.02-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.645-.87a6.97 6.97 0 0 1-.78-.449c-.314-.21-.688-.286-1.05-.174l-1.217.456a1.125 1.125 0 0 1-1.366-.488L2.94 15.47a1.125 1.125 0 0 1 .26-1.431l1.004-.827c.292-.24.437-.613.43-.992a7 7 0 0 1 0-.6c.007-.378-.138-.75-.43-.99l-1.004-.828a1.125 1.125 0 0 1-.26-1.43l1.297-2.247a1.125 1.125 0 0 1 1.366-.488l1.216.456c.362.111.736.036 1.05-.174a6.97 6.97 0 0 1 .78-.45c.333-.183.583-.495.646-.869l.213-1.28Z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/></svg>
        <span>Settings</span>
      </div>
      <div class="sidebar-footer-item">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z"/></svg>
        <span>suenyiyang</span>
      </div>
    </div>
  </aside>

  <!-- Main content -->
  <main class="main">
    <div class="hero">
      <div class="hero-title">What can I help you with?</div>
      <div class="hero-subtitle">Describe a task and Mano will handle it for you.</div>
    </div>

    <div class="chat-input-wrapper">
      <div class="chat-input-box">
        <textarea class="chat-textarea" rows="1" placeholder="Describe your task..."></textarea>
        <div class="chat-input-actions">
          <div class="input-tools">
            <button class="icon-btn" title="Attach file">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m18.375 12.739-7.693 7.693a4.5 4.5 0 0 1-6.364-6.364l10.94-10.94A3 3 0 1 1 19.5 7.372L8.552 18.32m.009-.01-.01.01m5.699-9.941-7.81 7.81a1.5 1.5 0 0 0 2.112 2.13"/></svg>
            </button>
            <button class="icon-btn" title="Web search">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 21a9.004 9.004 0 0 0 8.716-6.747M12 21a9.004 9.004 0 0 1-8.716-6.747M12 21c2.485 0 4.5-4.03 4.5-9S14.485 3 12 3m0 18c-2.485 0-4.5-4.03-4.5-9S9.515 3 12 3m0 0a8.997 8.997 0 0 1 7.843 4.582M12 3a8.997 8.997 0 0 0-7.843 4.582m15.686 0A11.953 11.953 0 0 1 12 10.5c-2.998 0-5.74-1.1-7.843-2.918m15.686 0A8.959 8.959 0 0 1 21 12c0 .778-.099 1.533-.284 2.253m0 0A17.919 17.919 0 0 1 12 16.5a17.92 17.92 0 0 1-8.716-2.247m0 0A8.966 8.966 0 0 1 3 12c0-1.264.26-2.467.73-3.56"/></svg>
            </button>
          </div>
          <button class="send-btn disabled">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 10.5 12 3m0 0 7.5 7.5M12 3v18"/></svg>
          </button>
        </div>
      </div>
    </div>

    <div class="quick-actions">
      <button class="quick-action">Build a website</button>
      <button class="quick-action">Analyze data</button>
      <button class="quick-action">Write code</button>
      <button class="quick-action">Research a topic</button>
    </div>
  </main>
</div>

</body>
</html>
